<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>足球诈骗</title>
    <link rel="stylesheet" href="/styles.css?v=20260628-0101">
  </head>
  <body>
    <header class="hero">
      <div class="hero-inner">
        <p class="hero-kicker">World Cup AI Odds Lab</p>
        <h1>足球诈骗</h1>
        <p class="hero-copy">多模型复盘公开比赛信息，输出可追踪的 Top 4 概率卡片。只做分析，不自动下注，不承诺盈利。</p>
        <div class="hero-actions">
          <a class="button secondary" href="/data">已抓取数据</a>
          <a class="button secondary" href="#historyPanel">查看历史</a>
        </div>
      </div>
    </header>

    <main>
      <section class="panel match-center reveal">
        <div class="section-title-row">
          <div>
            <h2>明日开场</h2>
            <p class="meta">默认展示明日世界杯场次。也可以切换到中超、中甲等赛事类型，再点击场次导入详情数据。</p>
          </div>
          <div class="match-center-controls">
            <label>日期 <input id="matchDate" type="date"></label>
            <label>赛事类型
              <select id="competitionFilter">
                <option value="125" selected>世界杯</option>
                <option value="10">重要比赛</option>
                <option value="5">中超</option>
                <option value="100">中甲</option>
                <option value="101">中乙</option>
                <option value="111">世俱杯</option>
                <option value="105">亚冠精英</option>
                <option value="6">英超</option>
                <option value="7">西甲</option>
                <option value="8">德甲</option>
                <option value="9">意甲</option>
                <option value="30">法甲</option>
                <option value="31">欧冠</option>
                <option value="34">欧联</option>
                <option value="98">澳超</option>
                <option value="99">沙特联</option>
              </select>
            </label>
            <button id="loadDongqiudiMatches">刷新场次</button>
          </div>
        </div>
        <div id="matchSchedule" class="schedule-grid"></div>
      </section>

      <section id="dataPage" class="panel data-viewer reveal" hidden>
        <div class="section-title-row">
          <div>
            <h2>当日已抓取数据</h2>
            <p class="meta">按场次展示阵容、天气、场地、近期战绩、积分、指数和专家公开信息。</p>
          </div>
          <a id="dataBackHome" class="button secondary" href="/">返回首页</a>
        </div>
        <div id="contextTabs" class="context-tabs"></div>
        <div id="contextExplorer" class="context-explorer"></div>
      </section>

      <section id="ai-panel" class="panel reveal">
        <h2>AI 预测</h2>
        <div id="contexts" class="contexts"></div>
        <div class="ai-controls">
          <div>
            <strong>AI 总预测</strong>
            <span>上方按钮会重新调用 API；预测完成后，下方模型标签只切换已有结果，不会重新扣费。</span>
          </div>
          <div class="ai-buttons">
            <button data-rank-model="all">重新预测全部 AI</button>
            <button class="secondary" data-rank-model="GPT">重跑 GPT</button>
            <button class="secondary" data-rank-model="Gemini">重跑 Gemini</button>
            <button class="secondary" data-rank-model="DeepSeek">重跑 DeepSeek</button>
            <button class="secondary" data-rank-model="Qwen">重跑 Qwen</button>
          </div>
        </div>
        <div id="rankings" class="rankings"></div>
      </section>

      <section id="matchPanel" class="panel reveal" hidden>
        <h2>单场详情</h2>
        <div id="matchDetail"></div>
      </section>

      <section id="historyPanel" class="panel reveal">
        <h2>历史报告</h2>
        <div id="reports" class="cards"></div>
      </section>
    </main>

    <script src="/app.js?v=20260628-0101"></script>
  </body>
</html>
